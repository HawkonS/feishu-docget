<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[/* page_title */]</title>
    <script src="https://unpkg.com/jszip/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/docx-preview/dist/docx-preview.min.js"></script>
    <style>
        /* [style_css] */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
            background: radial-gradient(circle at top left, #eef6ff, #f8f9ff 40%, #ffffff 70%);
            color: #1f2a44;
        }
        * { box-sizing: border-box; }
        .page {
            padding: 40px 48px 48px 48px;
            min-height: 100vh;
            position: relative;
        }
        .hero {
            background: linear-gradient(135deg, #e3f2ff, #f9f1ff);
            padding: 28px 32px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(42, 68, 111, 0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 28px;
        }
        .hero-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .hero-sub {
            color: #54607a;
            font-size: 14px;
        }
        .usage-link {
            color: #3b82f6;
            text-decoration: none;
            margin-left: 10px;
            font-size: 14px;
        }
        .usage-link:hover {
            text-decoration: underline;
            color: #2563eb;
        }
        .hero-input {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .hero-input input {
            width: 520px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #d9e4f5;
            background: #ffffff;
            font-size: 14px;
            outline: none;
        }
        .hero-input button {
            padding: 12px 18px;
            border-radius: 12px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(59, 130, 246, 0.3);
            white-space: nowrap;
        }
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .panel {
            background: #ffffff;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 10px 24px rgba(34, 47, 68, 0.08);
            min-width: 0;
            overflow: hidden;
        }
        .footer-copyright {
            position: fixed;
            bottom: 10px;
            right: 20px;
            color: #94a3b8;
            font-size: 12px;
            z-index: 1000;
        }
        .panel-title {
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 32px;
        }
        .centered-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            text-align: center;
            color: #94a3b8;
        }
        .progress-bar {
            height: 8px;
            background: #eef2ff;
            border-radius: 999px;
            overflow: hidden;
        }
        .progress-bar span {
            display: block;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            width: 0%;
        }
        .log-container {
            height: 180px;
            overflow-y: auto;
            border: 1px solid #e3e8f5;
            border-radius: 12px;
            background: #f8fafc;
        }
        .task-list {
            height: 246px;
            margin-bottom: 12px;
        }
        .btn-success {
            background: #10b981;
        }
        .log-item {
            padding: 10px;
            border-bottom: 1px dashed #e3e8f5;
            font-size: 12px;
            color: #4c5a75;
            word-break: break-all;
        }
        .log-item strong {
            color: #1f2a44;
        }
        .download-link {
            display: inline-block;
            margin-top: 6px;
            color: #2563eb;
            font-weight: 600;
            text-decoration: none;
        }
        .btn-small {
            padding: 6px 12px;
            background: #3b82f6;
            color: white;
            border-radius: 6px;
            font-size: 12px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        /* Split View Styles */
        .split-view {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 15px;
            height: 250px;
            margin-bottom: 20px;
        }
        .list-view {
            border: 1px solid #e3e8f5;
            border-radius: 8px;
            overflow-y: auto;
            background: #f8fafc;
        }
        .list-item {
            padding: 10px;
            font-size: 13px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
            max-height: 2.7em;
            text-overflow: ellipsis;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .list-item:hover {
            background: #eef6ff;
        }
        .list-item.active {
            background: #3b82f6;
            color: white;
        }
        .preview-pane {
            border: 1px solid #e3e8f5;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .preview-content {
            width: 100%;
            height: 100%;
            overflow: auto;
            padding: 10px;
            box-sizing: border-box;
        }
        #templatePreview {
            overflow-y: auto;
            overflow-x: hidden;
            display: block;
            padding: 2px;
        }
        /* Table styles will be injected by [style_css] */
        .tbl-preview { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            height: 100%;
        }
        .tbl-preview table { 
            width: 90%; 
            border-collapse: collapse; 
            font-size: 12px; 
            margin: auto;
        }
        .tbl-preview td, .tbl-preview th { padding: 6px; border: 1px solid #ccc; }
        .docx { margin: 0 !important; box-shadow: none !important; }

        /* Mobile specific styles */
        .mobile-select {
            display: none;
            width: 100%;
            padding: 10px;
            border: 1px solid #d9e4f5;
            border-radius: 8px;
            margin-bottom: 12px;
            background: #fff;
            font-size: 16px; /* Prevents zoom on iOS */
        }

        @media (max-width: 1200px) {
            .layout { grid-template-columns: 1fr; gap: 20px; }
            .hero { flex-direction: column; align-items: flex-start; padding: 20px; }
            .hero > div:first-child { width: 100%; }
            .hero-title { width: 100%; white-space: normal; word-break: break-word; font-size: 22px; }
            .hero-sub { width: 100%; white-space: normal; margin-bottom: 10px; }
            
            .hero-input { flex-direction: column; width: 100%; align-items: stretch; }
            .hero-input input { 
                width: 100% !important; 
                box-sizing: border-box; 
                margin-bottom: 10px; 
                font-size: 16px; 
                padding: 12px;
            }
            .hero-input button { 
                width: 100%; 
                white-space: nowrap; 
                font-size: 16px;
                padding: 12px;
            }
            
            .page { padding: 16px; padding-bottom: 40px; }
            
            .list-view { display: none; }
            .mobile-select { display: block; }
            
            .split-view { 
                grid-template-columns: 1fr !important; 
                height: auto !important; 
                display: flex;
                flex-direction: column;
            }
            .preview-pane { height: 200px !important; width: 100%; }
            
            .task-list { height: 200px; display: block; }
            .log-container { height: 160px; }
            
            .panel { padding: 16px; }
            .docx { width: 100% !important; }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
        }
        .form-group {
            margin-bottom: 12px;
        }
        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            font-weight: 600;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 8px;
            border: 1px solid #d9e4f5;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .icon-btn {
            background: none;
            border: 1px solid #d9e4f5;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 8px;
            color: #64748b;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .icon-btn:hover {
            background: #f1f5f9;
            color: #3b82f6;
            border-color: #3b82f6;
        }
        .panel-header-actions {
            display: flex;
            gap: 10px;
        }
        /* Input Group Styles */
        .input-group {
            display: flex;
            align-items: center;
        }
        .input-group input {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
            flex: 1;
            /* 移除可能存在的右边框，避免双重边框，但这里因为addon有左边框0，所以input保留右边框即可 */
        }
        .input-group input[type="file"] {
             /* 文件输入框特殊处理 */
             padding: 6px;
        }
        .input-group-addon {
            padding: 8px 12px;
            background: #f1f5f9;
            border: 1px solid #d9e4f5;
            border-left: 0;
            border-top-right-radius: 6px;
            border-bottom-right-radius: 6px;
            color: #64748b;
            font-size: 13px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="hero">
            <div>
                <div class="hero-title">[/* page_title */]</div>
                <div class="hero-sub">
                    [/* page_description */]
                    <a href="[/* usage_doc_url */]" target="_blank" class="usage-link">[/* usage_link_text */]</a>
                </div>
            </div>
            <div class="hero-input">
                <input id="docUrl" placeholder="[/* page_placeholder */]" />
                <button onclick="startDownload()">确认下载</button>
            </div>
        </div>
        <div class="layout">
            <div class="panel">
                <div class="panel-title">
                    模板与样式
                    <div class="panel-header-actions">
                        <button onclick="showAdvancedModal()" class="icon-btn" title="高级选项">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                            高级选项
                        </button>
                        <button onclick="showUploadModal()" class="icon-btn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                            上传模板
                        </button>
                    </div>
                </div>
                
                <div style="margin-bottom:8px;">
                    <label style="font-weight:600; font-size:14px;">Word 模板选择</label>
                </div>
                
                <select id="templateSelectMobile" class="mobile-select" onchange="onMobileTemplateChange()"></select>
                
                <div class="split-view">
                    <div class="list-view" id="templateList"></div>
                    <div class="preview-pane" id="templatePreview">
                        <div class="centered-placeholder">请选择模板</div>
                    </div>
                </div>
                
                <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">表格样式选择</label>
                
                <select id="styleSelectMobile" class="mobile-select" onchange="onMobileStyleChange()"></select>
                
                <div class="split-view" style="height:180px;">
                    <div class="list-view" id="styleList"></div>
                    <div class="preview-pane">
                        <div class="preview-content tbl-preview" id="stylePreview">
                            <div style="color:#999; font-size:13px; text-align:center; padding-top:60px;">请选择样式</div>
                        </div>
                    </div>
                </div>

            </div>
            <div class="panel">
                <div class="panel-title">
                    任务管理
                    <div id="taskDownloadArea"></div>
                </div>
                <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">任务清单</label>
                <div class="list-view task-list" id="taskList" style="margin-bottom:20px">
                    <div class="centered-placeholder">任务待开始</div>
                </div>
                <label style="font-weight:600; font-size:14px; display:block; margin-bottom:8px;">日志记录</label>
                <div class="log-container" id="logList">
                    <div class="centered-placeholder">任务待开始</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content" style="width: 400px;">
            <h3 style="margin-top:0;">上传自定义模板</h3>
            
            <div class="form-group">
                <label>模板名称 <span style="color:red">*</span></label>
                <div class="input-group">
                    <input type="text" id="tplName" class="form-select" placeholder="给模板起个名字(无需填写后缀)">
                    <span class="input-group-addon">.docx/.png</span>
                </div>
            </div>
            
            <div class="form-group">
                <label>模板文件<span style="color:red">*</span></label>
                <input type="file" id="tplFile" class="form-select" accept=".docx">
            </div>
            
            <div class="form-group">
                <label>预览图片 (选填)</label>
                <div class="input-group">
                    <input type="file" id="tplImage" class="form-select" accept="image/*" style="flex:1;">
                </div>
                <div style="font-size:11px; color:#94a3b8; margin-top:4px;">图片名称将自动与模板同步</div>
            </div>
            
            <div class="form-group">
                <label>存储模式 <span style="color:red">*</span></label>
                <select id="tplMode" class="form-select">
                    <option value="one_time">仅本次使用 (临时)</option>
                    <option value="long_term">长期存储 (永久)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>上传密码 <span style="color:red">*</span></label>
                <input type="password" id="tplPassword" class="form-select" placeholder="请输入对应模式的密码">
            </div>
            
            <div style="text-align:right; display:flex; justify-content:flex-end; gap:10px;">
                <button onclick="closeUploadModal()" style="padding:8px 16px; border:1px solid #ddd; background:#fff; border-radius:6px; cursor:pointer;">取消</button>
                <button onclick="uploadTemplate()" class="btn-start" style="padding:8px 16px;">上传</button>
            </div>
        </div>
    </div>

    <div id="advancedModal" class="modal">
        <div class="modal-content" style="width:360px;">
            <h3 style="margin-top:0">高级选项</h3>
            <div class="form-group">
                <label>常规设置</label>
                <label style="display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="addCover" style="width:auto; margin-right:8px;" checked> 
                    添加模板封面/首页
                </label>
                <label style="display:flex; align-items:center; cursor:pointer; margin-top:8px;">
                    <input type="checkbox" id="ignoreMention" style="width:auto; margin-right:8px;"> 
                    忽略文本中@人员转换
                </label>
            </div>
            <div class="form-group">
                <label style="display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="enableListStyle" onchange="toggleListStyle()" style="width:auto; margin-right:8px;" checked> 
                    添加无序列表样式
                </label>
                <div id="listStyleConfig" style="margin-top: 10px;">
                    <select id="unorderedListStyle" style="width: 100%; padding: 8px; border: 1px solid #d9e4f5; border-radius: 6px;">
                        <option value="default" selected>一级 ● | 二级 ○</option>
                        <option value="square">一级 ■ | 二级 □</option>
                        <option value="diamond">一级 ◆ | 二级 ◇</option>
                        <option value="arrow">一级 ➢ | 二级 ➤</option>
                        <option value="none">无符号</option>
                    </select>
                    <div style="font-size:12px; color:#666; margin-top:4px;">
                        当选择“作为正文处理”时，列表项将不再有前面的符号，且缩进与正文一致。
                    </div>
                </div>
            </div>
            
            <div class="form-group" style="margin-top: 15px; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                <label style="display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="enableBodyStyle" onchange="toggleBodyStyle()" style="width:auto; margin-right:8px;"> 
                    调整正文样式
                </label>
                <div id="bodyStyleConfig" style="display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                        <!-- Font Size -->
                        <div>
                            <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">字号 (磅)</label>
                            <div style="display: flex; gap: 5px;">
                                <input type="number" id="styleFontSize" value="12" step="0.5" style="flex: 1; min-width: 0; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;" oninput="syncFontSizeSelect(this.value)">
                                <select id="styleFontSizeSelect" onchange="document.getElementById('styleFontSize').value=this.value" style="width: 80px; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                                    <option value="">-</option>
                                    <option value="42">初号</option>
                                    <option value="36">小初</option>
                                    <option value="26">一号</option>
                                    <option value="24">小一</option>
                                    <option value="22">二号</option>
                                    <option value="18">小二</option>
                                    <option value="16">三号</option>
                                    <option value="15">小三</option>
                                    <option value="14">四号</option>
                                    <option value="12" selected>小四</option>
                                    <option value="10.5">五号</option>
                                    <option value="9">小五</option>
                                    <option value="7.5">六号</option>
                                    <option value="6.5">小六</option>
                                    <option value="5.5">七号</option>
                                    <option value="5">八号</option>
                                </select>
                            </div>
                        </div>
                    <!-- Line Spacing -->
                    <div>
                        <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">行间距</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="styleLineSpacing" value="1.5" step="0.1" style="flex: 1; min-width: 0; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                            <select id="styleLineSpacingUnit" style="width: 80px; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                                <option value="lines">倍</option>
                                <option value="pt">磅</option>
                            </select>
                        </div>
                    </div>
                    <!-- Space Before -->
                    <div>
                        <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">段前</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="styleSpaceBefore" value="0" step="0.5" style="flex: 1; min-width: 0; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                            <select id="styleSpaceBeforeUnit" style="width: 80px; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                                <option value="lines">行</option>
                                <option value="pt">磅</option>
                            </select>
                        </div>
                    </div>
                    <!-- Space After -->
                    <div>
                        <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">段后</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="number" id="styleSpaceAfter" value="0" step="0.5" style="flex: 1; min-width: 0; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                            <select id="styleSpaceAfterUnit" style="width: 80px; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                                <option value="lines">行</option>
                                <option value="pt">磅</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                <label style="display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="enableImageStyle" onchange="toggleImageStyle()" style="width:auto; margin-right:8px;" checked> 
                    调整图片样式
                </label>
                <div id="imageStyleConfig" style="display: block; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                    <div>
                        <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">最大宽度 (cm)</label>
                        <input type="number" id="imageMaxWidth" value="16" step="0.5" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                    </div>
                    <div>
                        <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">最大高度 (cm)</label>
                        <input type="number" id="imageMaxHeight" value="23" step="0.5" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                    </div>
                    <div>
                        <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">对齐方式</label>
                        <select id="imageAlign" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                            <option value="center" selected>居中</option>
                            <option value="left">居左</option>
                            <option value="right">居右</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                <label style="display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="enableTableCleaning" onchange="toggleTableCleaning()" style="width:auto; margin-right:8px;" checked> 
                    表格清洗设置
                </label>
                <div id="tableCleaningConfig" style="display: block; grid-template-columns: 1fr; gap: 10px; margin-top: 10px;">
                    <label style="display:flex; align-items:center; cursor:pointer; font-size: 13px; margin-bottom: 8px;">
                        <input type="checkbox" id="tableForceClearIndent" style="width:auto; margin-right:8px;" checked> 
                        强制清除表格缩进
                    </label>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">表头文字对齐</label>
                            <select id="tableHeaderAlign" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                                <option value="center" selected>居中</option>
                                <option value="left">居左</option>
                                <option value="right">居右</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">内容文字对齐</label>
                            <select id="tableContentAlign" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                                <option value="center">居中</option>
                                <option value="left" selected>居左</option>
                                <option value="right">居右</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                <label style="display:flex; align-items:center; cursor:pointer;">
                    <input type="checkbox" id="enablePageMargins" onchange="togglePageMargins()" style="width:auto; margin-right:8px;"> 
                    页边距管理 (不含封面)
                </label>
                <div id="pageMarginsConfig" style="display: none; grid-template-columns: 1fr; gap: 10px; margin-top: 10px;">
                    <div>
                        <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">快速选择预设</label>
                        <select id="marginPreset" onchange="applyMarginPreset(this.value)" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;">
                            <option value="custom" selected>自定义</option>
                            <option value="normal">普通 (上下2.54, 左右3.18)</option>
                            <option value="narrow">窄 (上下左右1.27)</option>
                            <option value="wide">宽 (上下2.54, 左右5.08)</option>
                            <option value="moderate">适中 (上下2.54, 左右1.91)</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                        <div>
                            <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">上边距 (cm)</label>
                            <input type="number" id="marginTop" value="2.54" step="0.01" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;" oninput="document.getElementById('marginPreset').value='custom'">
                        </div>
                        <div>
                            <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">下边距 (cm)</label>
                            <input type="number" id="marginBottom" value="2.54" step="0.01" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;" oninput="document.getElementById('marginPreset').value='custom'">
                        </div>
                        <div>
                            <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">左边距 (cm)</label>
                            <input type="number" id="marginLeft" value="3.18" step="0.01" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;" oninput="document.getElementById('marginPreset').value='custom'">
                        </div>
                        <div>
                            <label style="font-size: 12px; color: #64748b; margin-bottom: 2px;">右边距 (cm)</label>
                            <input type="number" id="marginRight" value="3.18" step="0.01" style="width: 100%; padding: 6px; border: 1px solid #d9e4f5; border-radius: 6px;" oninput="document.getElementById('marginPreset').value='custom'">
                        </div>
                    </div>
                </div>
            </div>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:20px;">
                <button onclick="resetAdvancedOptions()" class="btn-small" style="background:#fff; color:#64748b; border:1px solid #cbd5e1;">恢复默认</button>
                <div style="display:flex; gap:10px;">
                    <button onclick="closeAdvancedModal()" class="btn-small" style="background:#fff; border:1px solid #cbd5e1; color:#333;">取消</button>
                    <button onclick="closeAdvancedModal()" class="btn-small">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let jobId = "";
        let timer = null;
        let selectedTemplate = "";
        let selectedStyle = "1";
        let tasks = [];
        let selectedTaskId = "";
        
        // 这些变量将在后端渲染时被替换
        const templates = [/* template_json */];
        const styles = [/* style_json */];

        function initUI() {
            // 初始化模板列表
            const tList = document.getElementById("templateList");
            const tSelect = document.getElementById("templateSelectMobile");
            
            // 将默认模板排序到第一位
            const defaultTemplate = "[/* default_template */]";
            templates.sort((a, b) => {
                if (a.name === defaultTemplate) return -1;
                if (b.name === defaultTemplate) return 1;
                return a.name.localeCompare(b.name);
            });
            
            let defaultFound = false;
            
            tSelect.innerHTML = '<option value="">请选择模板</option>';
            
            templates.forEach(t => {
                // 如果是临时模板，不显示在列表中（除非是刚刚上传的？）
                // 或者我们可以显示，但标记为临时
                // 这里我们选择显示所有，但可能需要区分样式
                
                // 列表项
                const div = document.createElement("div");
                div.className = "list-item";
                div.dataset.value = t.name;
                
                // 显示名称处理
                let displayName = t.name;
                if (t.display_name) {
                    displayName = t.display_name;
                } else if (t.is_temp) {
                    const parts = t.name.split('_', 2);
                    if (parts.length >= 3) displayName = parts[2];
                }
                
                div.innerText = displayName + (t.is_temp ? " (临时)" : "");
                div.onclick = () => {
                    selectTemplate(t.name);
                };
                tList.appendChild(div);
                
                // 下拉选项
                const opt = document.createElement("option");
                opt.value = t.name;
                opt.innerText = displayName + (t.is_temp ? " (临时)" : "");
                tSelect.appendChild(opt);
                
                if (t.name === defaultTemplate) {
                    selectTemplate(t.name);
                    defaultFound = true;
                }
            });
            
            if (!defaultFound && templates.length > 0) {
                selectTemplate(templates[0].name);
            }
            
            // 初始化样式列表
            const sList = document.getElementById("styleList");
            const sSelect = document.getElementById("styleSelectMobile");
            sSelect.innerHTML = '<option value="">请选择样式</option>';
            
            styles.forEach(s => {
                // 列表项
                const div = document.createElement("div");
                div.className = "list-item";
                div.dataset.value = s.id;
                // Check if s.name exists before calling split
                const displayName = s.name ? s.name.split(/[:：]/)[0] : `样式 ${s.id}`;
                div.innerText = displayName; // 简短名称
                div.title = s.name || "";
                div.onclick = () => {
                    selectStyle(s.id);
                };
                sList.appendChild(div);
                
                // 下拉选项
                const opt = document.createElement("option");
                opt.value = s.id;
                opt.innerText = s.name || `样式 ${s.id}`;
                sSelect.appendChild(opt);
            });
            
            // 默认选中第一个样式
            if (styles.length > 0) {
                selectStyle(styles[0].id);
            }
        }
        
        function selectTemplate(name) {
            selectedTemplate = name;
            // 更新列表 UI
            document.querySelectorAll("#templateList .list-item").forEach(d => {
                if (d.dataset.value === name) d.classList.add("active");
                else d.classList.remove("active");
            });
            // 更新下拉框 UI
            if (document.getElementById("templateSelectMobile").value !== name) {
                document.getElementById("templateSelectMobile").value = name;
            }
            
            previewTemplate(name);
        }
        
        function onMobileTemplateChange() {
            const val = document.getElementById("templateSelectMobile").value;
            if (val) selectTemplate(val);
        }
        
        function selectStyle(id) {
            selectedStyle = id;
            
            // 更新列表 UI
            document.querySelectorAll("#styleList .list-item").forEach(d => {
                if (d.dataset.value == id) d.classList.add("active");
                else d.classList.remove("active");
            });
            // 更新下拉框 UI
            if (document.getElementById("styleSelectMobile").value != id) {
                document.getElementById("styleSelectMobile").value = id;
            }
            
            previewStyle(id);
        }
        
        function onMobileStyleChange() {
            const val = document.getElementById("styleSelectMobile").value;
            if (val) selectStyle(val);
        }
        
        function previewTemplate(name) {
            const preview = document.getElementById("templatePreview");
            preview.innerHTML = '<div style="color:#666">加载预览...</div>';
            
            const t = templates.find(x => x.name === name);
            if (t && t.has_png) {
                preview.innerHTML = `<img src="/api/template_preview/${encodeURIComponent(name)}" style="width:100%; height:auto; display:block;" onerror="this.onerror=null;this.parentNode.innerHTML='无法预览';"/>`;
                return;
            }

            fetch(`/api/template/${encodeURIComponent(name)}`)
                .then(res => res.blob())
                .then(blob => {
                    preview.innerHTML = "";
                    
                    const sizingWrapper = document.createElement("div");
                    const transformWrapper = document.createElement("div");
                    transformWrapper.style.display = "inline-block";
                    
                    sizingWrapper.appendChild(transformWrapper);
                    preview.appendChild(sizingWrapper);

                    docx.renderAsync(blob, transformWrapper, null, { inWrapper: false, ignoreWidth: false })
                        .then(() => {
                            const containerWidth = preview.clientWidth - 10;
                            const contentWidth = transformWrapper.scrollWidth || transformWrapper.getBoundingClientRect().width;
                            const contentHeight = transformWrapper.offsetHeight;
                            
                            if (contentWidth > containerWidth) {
                                const scale = containerWidth / contentWidth;
                                transformWrapper.style.transformOrigin = "top left";
                                transformWrapper.style.transform = `scale(${scale})`;
                                sizingWrapper.style.height = (contentHeight * scale) + "px";
                                sizingWrapper.style.width = "100%";
                                sizingWrapper.style.overflow = "hidden";
                            }
                            preview.scrollTop = 0;
                        })
                        .catch(err => {
                            preview.innerHTML = `<img src="/api/template_preview/${encodeURIComponent(name)}" style="max-width:100%;" onerror="this.onerror=null;this.parentNode.innerText='无法预览';"/>`;
                        });
                });
        }
        
        function previewStyle(id) {
            const preview = document.getElementById("stylePreview");
            const html = `
                <table class="style-${id}">
                    <thead>
                        <tr><th>项目</th><th>说明</th><th>备注</th></tr>
                    </thead>
                    <tbody>
                        <tr><td>样例 A</td><td>字段示例</td><td>可替换</td></tr>
                        <tr><td>样例 B</td><td>字段示例</td><td>可替换</td></tr>
                        <tr><td>样例 C</td><td>字段示例</td><td>可替换</td></tr>
                    </tbody>
                </table>
            `;
            preview.innerHTML = html;
        }

        function startDownload() {
            const url = document.getElementById("docUrl").value.trim();
            const addCover = document.getElementById("addCover").checked;
            const ignoreMention = document.getElementById("ignoreMention").checked;
            
            let unorderedListStyle = "none";
            if (document.getElementById("enableListStyle").checked) {
                unorderedListStyle = document.getElementById("unorderedListStyle").value;
            }
            
            // Collect Body Style Options
            let bodyStyle = null;
            if (document.getElementById("enableBodyStyle").checked) {
                bodyStyle = {
                    fontSize: parseFloat(document.getElementById("styleFontSize").value),
                    lineSpacing: parseFloat(document.getElementById("styleLineSpacing").value),
                    lineSpacingUnit: document.getElementById("styleLineSpacingUnit").value,
                    spaceBefore: parseFloat(document.getElementById("styleSpaceBefore").value),
                    spaceBeforeUnit: document.getElementById("styleSpaceBeforeUnit").value,
                    spaceAfter: parseFloat(document.getElementById("styleSpaceAfter").value),
                    spaceAfterUnit: document.getElementById("styleSpaceAfterUnit").value
                };
            }

            // Collect Image Style Options
            let imageStyle = null;
            if (document.getElementById("enableImageStyle").checked) {
                imageStyle = {
                    maxWidth: parseFloat(document.getElementById("imageMaxWidth").value),
                    maxHeight: parseFloat(document.getElementById("imageMaxHeight").value),
                    align: document.getElementById("imageAlign").value
                };
            }

            // Collect Table Cleaning Options
            let tableConfig = null;
            if (document.getElementById("enableTableCleaning").checked) {
                tableConfig = {
                    forceClearIndent: document.getElementById("tableForceClearIndent").checked,
                    headerAlign: document.getElementById("tableHeaderAlign").value,
                    contentAlign: document.getElementById("tableContentAlign").value
                };
            }

            // Collect Margin Config Options
            let marginConfig = null;
            if (document.getElementById("enablePageMargins").checked) {
                marginConfig = {
                    top: parseFloat(document.getElementById("marginTop").value),
                    bottom: parseFloat(document.getElementById("marginBottom").value),
                    left: parseFloat(document.getElementById("marginLeft").value),
                    right: parseFloat(document.getElementById("marginRight").value)
                };
            }

            if (!url) return alert("请输入文档链接");
            
            if (timer) clearTimeout(timer);
            
            fetch("/api/start", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    url, 
                    template: selectedTemplate, 
                    tableStyle: selectedStyle, 
                    addCover,
                    ignoreMention,
                    unorderedListStyle,
                    bodyStyle,
                    imageStyle,
                    tableConfig,
                    marginConfig
                })
            }).then(r => r.json()).then(res => {
                if (res.status !== "ok") {
                    alert(res.message || "提交失败");
                    return;
                }
                jobId = res.job_id;
                addTask(res.job_id, url || "任务待开始");
                pollStatus();
            });
        }
        
        function pollStatus() {
            if (!jobId) return;
            fetch(`/api/status/${jobId}`).then(r => r.json()).then(res => {
                if (res.status === "error") {
                    updateTaskFromStatus(res);
                    renderTaskList();
                    renderLogs();
                    return;
                }
                updateTaskFromStatus(res);
                renderTaskList();
                renderLogs();
                if (res.status === "done") {
                    // 任务完成，如果使用了临时模板，则移除它
                    if (res.template && res.template.startsWith('temp_')) {
                        removeTempTemplate(res.template);
                    }
                } else {
                    // 继续轮询，间隔 2000ms
                    timer = setTimeout(pollStatus, 2000);
                }
            }).catch(() => {
                // 出错重试
                timer = setTimeout(pollStatus, 3000);
            });
        }
        
        function removeTempTemplate(name) {
            // 找到索引
            const idx = templates.findIndex(t => t.name === name);
            if (idx === -1) return;
            
            // 从全局数组中移除
            templates.splice(idx, 1);
            
            // 从下拉框移除
            const select = document.getElementById("templateSelectMobile");
            const option = Array.from(select.options).find(o => o.value === name);
            if (option) select.removeChild(option);
            
            // 从列表移除
            const list = document.getElementById("templateList");
            const item = Array.from(list.children).find(d => d.dataset.value === name);
            if (item) list.removeChild(item);
            
            // 如果当前选中该模板，切换回默认或第一个
            if (selectedTemplate === name) {
                const defaultTpl = templates.find(t => t.is_default);
                if (defaultTpl) {
                    selectTemplate(defaultTpl.name);
                } else if (templates.length > 0) {
                    selectTemplate(templates[0].name);
                } else {
                    selectedTemplate = "";
                    document.getElementById("templatePreview").innerHTML = '<div class="centered-placeholder">请选择模板</div>';
                }
            }
        }

        function addTask(id, name) {
            const exists = tasks.find(t => t.job_id === id);
            if (exists) {
                selectedTaskId = id;
                renderTaskList();
                renderLogs();
                return;
            }
            tasks.unshift({
                job_id: id,
                name: name || "任务待开始",
                status: "pending",
                logs: [],
                docx_path: ""
            });
            selectedTaskId = id;
            renderTaskList();
            renderLogs();
        }

        function updateTaskFromStatus(res) {
            const id = res.job_id || jobId;
            let task = tasks.find(t => t.job_id === id);
            if (!task) {
                addTask(id, res.doc_url || "任务待开始");
                task = tasks.find(t => t.job_id === id);
            }
            if (!task) return;
            task.status = res.status || task.status;
            task.logs = res.logs || task.logs;
            task.docx_path = res.docx_path || task.docx_path;
            const name = res.doc_url || res.folder || task.name;
            task.name = name || task.name;
        }

        function renderTaskList() {
            const list = document.getElementById("taskList");
            if (!tasks.length) {
                list.innerHTML = `<div class="centered-placeholder">任务待开始</div>`;
                document.getElementById("taskDownloadArea").innerHTML = "";
                return;
            }
            list.innerHTML = "";
            tasks.forEach(t => {
                const div = document.createElement("div");
                div.className = "list-item" + (t.job_id === selectedTaskId ? " active" : "");
                div.innerText = t.name || "任务待开始";
                div.onclick = () => {
                    selectedTaskId = t.job_id;
                    renderTaskList();
                    renderLogs();
                };
                list.appendChild(div);
            });
            renderDownloadButton();
        }

        function renderLogs() {
            const list = document.getElementById("logList");
            if (!tasks.length || !selectedTaskId) {
                list.innerHTML = `<div class="centered-placeholder">任务待开始</div>`;
                return;
            }
            const task = tasks.find(t => t.job_id === selectedTaskId);
            if (!task || !task.logs || !task.logs.length) {
                list.innerHTML = `<div class="centered-placeholder">任务待开始</div>`;
                return;
            }
            list.innerHTML = "";
            task.logs.slice().reverse().forEach(item => {
                const div = document.createElement("div");
                div.className = "log-item";
                div.innerHTML = `<strong>${item.ts}</strong><br/>${item.message}`;
                list.appendChild(div);
            });
            renderDownloadButton();
        }

        function renderDownloadButton() {
            const area = document.getElementById("taskDownloadArea");
            const task = tasks.find(t => t.job_id === selectedTaskId);
            
            if (!task) {
                area.innerHTML = "";
                return;
            }
            
            let html = "";
            
            // 使用 icon-btn 类保持大小和布局一致，但覆盖颜色
            const commonStyle = "padding: 6px 10px; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; border: none; display: flex; align-items: center; gap: 6px;";
            
            if (task.status === "done") {
                html = `<button onclick="downloadDoc('${task.job_id}')" class="icon-btn" style="${commonStyle} background-color: #10b981; color: white;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    下载文档
                </button>`;
            } else if (task.status === "running" || task.status === "pending") {
                html = `<button onclick="stopTask('${task.job_id}')" class="icon-btn" style="${commonStyle} background-color: #ef4444; color: white;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><rect x="9" y="9" width="6" height="6"></rect></svg>
                    停止下载
                </button>`;
            } else if (task.status === "stopped") {
                html = `<span style="color:#ef4444; font-size:13px; font-weight:600; display: flex; align-items: center; gap: 6px; padding: 6px 10px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line></svg>
                    已停止
                </span>`;
            }
            
            area.innerHTML = html;
        }

        function downloadDoc(id) {
            window.location.href = `/api/download/${id}`;
        }
        
        function stopTask(id) {
            if (!confirm("确定要停止当前下载任务吗？已下载的内容将被删除。")) return;
            
            fetch(`/api/stop/${id}`, { method: "POST" })
                .then(r => r.json())
                .then(res => {
                    if (res.status === "ok") {
                        // 立即更新本地状态
                        const task = tasks.find(t => t.job_id === id);
                        if (task) {
                            task.status = "stopped";
                            // 添加日志前先检查是否已存在类似日志，避免重复
                            const logs = task.logs || [];
                            const lastLog = logs.length > 0 ? logs[logs.length - 1] : null;
                            if (!lastLog || lastLog.message !== "用户手动停止了任务") {
                                task.logs.push({
                                    ts: new Date().toISOString(),
                                    message: "用户手动停止了任务",
                                    type: "error"
                                });
                            }
                            renderTaskList();
                            renderLogs();
                        }
                    } else {
                        alert(res.message || "停止失败");
                    }
                });
        }

        // Modal
        function showUploadModal() { document.getElementById("uploadModal").style.display = "flex"; }
        function closeUploadModal() { document.getElementById("uploadModal").style.display = "none"; }
        
        function showAdvancedModal() { document.getElementById("advancedModal").style.display = "flex"; }
        function closeAdvancedModal() { document.getElementById("advancedModal").style.display = "none"; }
        
        function resetAdvancedOptions() {
            if (!confirm("确定要恢复所有高级选项到默认值吗？")) return;
            
            document.getElementById("addCover").checked = true;
            document.getElementById("ignoreMention").checked = false;
            
            document.getElementById("enableListStyle").checked = true;
            document.getElementById("unorderedListStyle").value = "default";
            toggleListStyle();
            
            document.getElementById("enableBodyStyle").checked = false;
            document.getElementById("styleFontSize").value = "12";
            document.getElementById("styleFontSizeSelect").value = "12";
            document.getElementById("styleLineSpacing").value = "1.5";
            document.getElementById("styleLineSpacingUnit").value = "lines";
            document.getElementById("styleSpaceBefore").value = "0";
            document.getElementById("styleSpaceBeforeUnit").value = "lines";
            document.getElementById("styleSpaceAfter").value = "0";
            document.getElementById("styleSpaceAfterUnit").value = "lines";
            toggleBodyStyle();

            document.getElementById("enableImageStyle").checked = true;
            document.getElementById("imageMaxWidth").value = "[/* image_max_width */]";
            document.getElementById("imageMaxHeight").value = "[/* image_max_height */]";
            document.getElementById("imageAlign").value = "center";
            toggleImageStyle();

            document.getElementById("enableTableCleaning").checked = true;
            document.getElementById("tableForceClearIndent").checked = true;
            document.getElementById("tableHeaderAlign").value = "center";
            document.getElementById("tableContentAlign").value = "left";
            toggleTableCleaning();

            document.getElementById("enablePageMargins").checked = false;
            document.getElementById("marginPreset").value = "custom";
            document.getElementById("marginTop").value = "2.54";
            document.getElementById("marginBottom").value = "2.54";
            document.getElementById("marginLeft").value = "3.18";
            document.getElementById("marginRight").value = "3.18";
            togglePageMargins();
        }

        function toggleListStyle() {
            const checked = document.getElementById("enableListStyle").checked;
            document.getElementById("listStyleConfig").style.display = checked ? "block" : "none";
        }

        function toggleBodyStyle() {
            const checked = document.getElementById("enableBodyStyle").checked;
            document.getElementById("bodyStyleConfig").style.display = checked ? "grid" : "none";
        }

        function toggleImageStyle() {
            const checked = document.getElementById("enableImageStyle").checked;
            document.getElementById("imageStyleConfig").style.display = checked ? "grid" : "none";
        }

        function toggleTableCleaning() {
            const checked = document.getElementById("enableTableCleaning").checked;
            document.getElementById("tableCleaningConfig").style.display = checked ? "block" : "none";
        }

        function togglePageMargins() {
            const checked = document.getElementById("enablePageMargins").checked;
            document.getElementById("pageMarginsConfig").style.display = checked ? "block" : "none";
        }

        function applyMarginPreset(preset) {
            if (preset === 'custom') return;
            
            const margins = {
                'normal': [2.54, 2.54, 3.18, 3.18],
                'narrow': [1.27, 1.27, 1.27, 1.27],
                'wide': [2.54, 2.54, 5.08, 5.08],
                'moderate': [2.54, 2.54, 1.91, 1.91]
            };
            
            if (margins[preset]) {
                const [top, bottom, left, right] = margins[preset];
                document.getElementById("marginTop").value = top;
                document.getElementById("marginBottom").value = bottom;
                document.getElementById("marginLeft").value = left;
                document.getElementById("marginRight").value = right;
            }
        }

        function syncFontSizeSelect(val) {
            const select = document.getElementById('styleFontSizeSelect');
            let found = false;
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].value == val) {
                    select.selectedIndex = i;
                    found = true;
                    break;
                }
            }
            if (!found) {
                select.value = "";
            }
        }

        function clearUploadForm() {
            document.getElementById("tplName").value = "";
            document.getElementById("tplFile").value = "";
            document.getElementById("tplImage").value = "";
            document.getElementById("tplPassword").value = "";
        }

        function uploadTemplate() {
            const name = document.getElementById("tplName").value.trim();
            const fileInput = document.getElementById("tplFile");
            const imgInput = document.getElementById("tplImage");
            const mode = document.getElementById("tplMode").value;
            const password = document.getElementById("tplPassword").value;
            
            if (!name) return alert("请输入模板名称");
            if (fileInput.files.length === 0) return alert("请选择 Word 模板文件");
            if (!password) return alert("请输入上传密码");
            
            const formData = new FormData();
            formData.append("name", name);
            formData.append("file", fileInput.files[0]);
            if (imgInput.files.length > 0) {
                formData.append("image", imgInput.files[0]);
            }
            formData.append("mode", mode);
            formData.append("password", password);
            
            fetch("/api/upload_template", {
                method: "POST",
                body: formData
            }).then(r => r.json()).then(res => {
                if (res.status === "ok") {
                    alert("上传成功！");
                    if (mode === 'one_time') {
                        // 临时模式，手动添加到列表，不刷新页面
                        const filename = res.filename;
                        const displayName = name;
                        const fullDisplayName = displayName + " (临时)";
                        
                        // 更新全局数据，以便预览功能正常工作
                        templates.push({
                            name: filename,
                            display_name: displayName,
                            is_temp: true,
                            has_png: imgInput.files.length > 0,
                            is_default: false
                        });
                        
                        // 添加到下拉框
                        const select = document.getElementById("templateSelectMobile");
                        const opt = document.createElement("option");
                        opt.value = filename;
                        opt.innerText = fullDisplayName;
                        select.appendChild(opt);
                        
                        // 添加到列表视图
                        const list = document.getElementById("templateList");
                        const div = document.createElement("div");
                        div.className = "list-item";
                        div.dataset.value = filename;
                        div.innerText = fullDisplayName;
                        div.onclick = () => selectTemplate(filename);
                        
                        // 插入到列表末尾
                        list.appendChild(div);
                        
                        // 选中新模板
                        selectTemplate(filename);
                        
                        // 关闭弹窗
                        closeUploadModal();
                        clearUploadForm();
                    } else {
                        // 长期模式，刷新页面以更新列表
                        location.reload();
                    }
                } else {
                    alert("上传失败: " + res.message);
                }
            }).catch(e => {
                alert("请求错误: " + e.message);
            });
        }

        initUI();
        renderTaskList();
        renderLogs();
    </script>
